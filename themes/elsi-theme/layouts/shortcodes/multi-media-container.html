<div class="multi-media-container">
  {{ if eq (.Get "type") "video" }}
  <div class="media-video">
    <iframe
      width="100%"
      height="360"
      src='{{ .Get "href" }}'
      frameborder="0"
      allowfullscreen
    ></iframe>
  </div>
  {{ else if eq (.Get "type") "image" }}
  <div class="media-image">
    <img src='/{{ .Get "source" }}' />
  </div>
  {{ end }}
  <div class="media-caption">{{ .Inner | markdownify }}</div>
</div>
