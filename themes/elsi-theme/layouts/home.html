{{ define "main" }}
{{ with site.GetPage "home/home-hero" }}
<section class="home-hero">
  <div class="hero-container">
    {{ .Content }}
    <div class="hero-buttons">
      <a class="hero-button hero-button-primary" href="{{ (site.GetPage `section` `tools`).RelPermalink }}">
        Explore tools
      </a>
      <a class="hero-button hero-button-secondary" href="{{ (site.GetPage `section` `docs`).RelPermalink }}">
        View documentation
      </a>
</section>
{{ end }}
{{ with site.GetPage "home/project-history" }}
<section class="project-history">
  <div class="content-container">
    <div class="subtitle-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-clock h-10 w-10 text-blue-600">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <h1>
        {{ .Params.subtitle }}
      </h1>
    </div>
    <div class="history">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
{{ end }}
