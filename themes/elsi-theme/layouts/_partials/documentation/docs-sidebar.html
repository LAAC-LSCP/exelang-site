<div class="docs-sidebar">
  {{ $currentPage := .Page.File.BaseFileName }}
  <nav>
  {{ range .page_links }}
    <a
      href="#{{ .page_name }}"
      class="docs-btn {{ if eq $currentPage .page_name }}active-sidebar-btn{{ else }}inactive-sidebar-btn{{ end }}" data-page="{{ .page_name }}"
    >
      {{ .title }}
    </a>
  {{ end }}
  </nav>
</div>
