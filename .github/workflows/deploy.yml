# Requires the following to be set in your repository:
# Variables:
# - UPLOAD_TARGET: The rsync target string (e.g., user@host:/path)
# Secrets:
# - DEPLOYMENT_KEY_CONTENT: The private SSH key for deployment
name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'from-file'
          extended: true
      - run: npm install
      - run: npm run build
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOYMENT_KEY_CONTENT" > ~/.ssh/$DEPLOYMENT_KEY
          chmod 600 ~/.ssh/$DEPLOYMENT_KEY
      - name: Deploy via rsync
        run: npm run upload
    env:
      UPLOAD_TARGET: ${{ vars.UPLOAD_TARGET }}
      DEPLOYMENT_KEY_CONTENT: ${{ secrets.DEPLOYMENT_KEY_CONTENT }}
      DEPLOYMENT_KEY: elsi_site_deploy_key
